name: 포트폴리오 스냅샷 자동 갱신

# 가동 조건: repo Settings > Secrets에 SHEET_CSV_URL (자산관리 시트 게시 CSV) 등록 후 활성화.
# 그 전까지는 수동(대화에서 Claude가 JSON 커밋)으로 운영.

on:
  schedule:
    - cron: '5 7 * * 1-5'   # 평일 16:05 KST (07:05 UTC) — 한국장 마감 후
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 스냅샷 갱신 (규모·성과)
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python scripts/update_snapshot.py
      - name: 보유종목 갱신 (비중·수익률)
        env:
          HOLDINGS_CSV_URL: ${{ secrets.HOLDINGS_CSV_URL }}
        run: python scripts/update_holdings.py
      - name: 변경분 커밋
        run: |
          git config user.name "portfolio-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: 스냅샷 자동 갱신 $(date -u +%Y-%m-%d)"
          git push
